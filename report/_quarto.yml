project:
  type: book
  output-dir: _output

book:
  title: "The AI Robot Race and Its Hidden Cost"
  subtitle: "A 10-Year Outlook (2025–2035) — USA vs. China"
  author:
    - name: "Sandy E. Quintero"
      orcid: "0009-0005-7948-5622"
      affiliation: "SanBlueDot"
  date: "2026-06-18"
  date-format: "YYYY"
  chapters:
    - index.qmd
    - 01-superpower-duel.qmd
    - 02-economics-of-a-humanoid.qmd
    - 03-capital-investment.qmd
    - 04-reliability-gap.qmd
    - 05-trade-tariffs.qmd
    - 06-adoption-generational.qmd
    - 07-fast-hardware.qmd
    - 08-ewaste-wave.qmd
    - 09-circular-economy.qmd
    - 10-net-reckoning.qmd
    - conclusion.qmd
    - references.qmd

bibliography: references.bib
csl: apa.csl

execute:
  echo: false
  warning: false
  freeze: auto

format:
  html:
    theme:
      - cosmo
      - theme/sanblue.scss
    toc: true
    number-sections: true
    fig-format: svg
  typst:
    toc: true
    number-sections: true
    fig-format: svg
